<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水位显示</title>
    <style>
        body {
            position: relative; /* 为绝对定位的子元素提供参考 */
        }
        /* 水位容器样式 */
        .water-container {
            position: absolute; /* 使用绝对定位 */
            width: 98px; /* 大矩形宽度 */
            height: 142px; /* 大矩形高度 */
            border: 1px solid #000; /* 边框，可选 */
            overflow: hidden; /* 防止水位超出容器 */
            display: inline-block; /* 使多个容器横向排列 */
            margin: 10px; /* 容器之间的间距 */
        }
        .water-level {
            position: absolute;
            bottom: 0; /* 从底部开始填充 */
            width: 100%;
            background-color: rgb(11, 101, 167); /* 水的颜色 */
            transition: height 0.5s ease; /* 平滑过渡 */
        }
        /* 小矩形样式 */
        .small-water-container {
            width: 73px; /* 小矩形宽度 */
            height: 35px; /* 小矩形高度 */
        }
    </style>
</head>
<body>

    <!-- 大矩形水位容器 -->
    <div class="water-container" id="water-LT2101" style="left: 229px; top: 127px;">
        <div class="water-level" id="level-LT2101" style="height: 0;"></div>
    </div>
    <div class="water-container" id="water-LT2103" style="left: 579px; top: 127px;">
        <div class="water-level" id="level-LT2103" style="height: 0;"></div>
    </div>
    <div class="water-container" id="water-LT2106" style="left: 929px; top: 127px;">
        <div class="water-level" id="level-LT2106" style="height: 0;"></div>
    </div>
    <div class="water-container" id="water-LT2109" style="left: 1279px; top: 127px;">
        <div class="water-level" id="level-LT2109" style="height: 0;"></div>
    </div>
    <div class="water-container" id="water-LT2111" style="left: 1629px; top: 127px;">
        <div class="water-level" id="level-LT2111" style="height: 0;"></div>
    </div>

    <!-- 小矩形水位容器 -->
    <div class="small-water-container" id="water-LT2102" style="left: 91px; top: 731px;">
        <div class="water-level" id="level-LT2102" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2104" style="left: 436px; top: 801px;">
        <div class="water-level" id="level-LT2104" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2107" style="left: 786px; top: 801px;">
        <div class="water-level" id="level-LT2107" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2110" style="left: 1136px; top: 801px;">
        <div class="water-level" id="level-LT2110" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2112" style="left: 1486px; top: 801px;">
        <div class="water-level" id="level-LT2112" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2105" style="left: 286px; top: 941px;">
        <div class="water-level" id="level-LT2105" style="height: 0;"></div>
    </div>
    <div class="small-water-container" id="water-LT2108" style="left: 581px; top: 941px;">
        <div class="water-level" id="level-LT2108" style="height: 0;"></div>
    </div>

    <!-- 水位数据元素 -->
    <div id="LT2101">75%</div>
    <div id="LT2103">50%</div>
    <div id="LT2106">90%</div>
    <div id="LT2109">30%</div>
    <div id="LT2111">60%</div>
    <div id="LT2102">20%</div>
    <div id="LT2104">80%</div>
    <div id="LT2107">40%</div>
    <div id="LT2110">10%</div>
    <div id="LT2112">95%</div>
    <div id="LT2105">15%</div>
    <div id="LT2108">65%</div>

    <script>
        const maxHeightMap = {
            large: 142,
            small: 35
        };

        const waterIds = [
            { id: 'water-LT2101', type: 'large' },
            { id: 'water-LT2103', type: 'large' },
            { id: 'water-LT2106', type: 'large' },
            { id: 'water-LT2109', type: 'large' },
            { id: 'water-LT2111', type: 'large' },
            { id: 'water-LT2102', type: 'small' },
            { id: 'water-LT2104', type: 'small' },
            { id: 'water-LT2107', type: 'small' },
            { id: 'water-LT2110', type: 'small' },
            { id: 'water-LT2112', type: 'small' },
            { id: 'water-LT2105', type: 'small' },
            { id: 'water-LT2108', type: 'small' }
        ];

        function updateWaterLevel(waterElement, dataElement) {
            const valueStr = dataElement.textContent.trim().replace('%', '');
            const value = parseFloat(valueStr);

            if (isNaN(value)) {
                console.error(`无效的水位值: ${valueStr}`);
                return;
            }

            const type = waterElement.parentElement.classList.contains('small-water-container') ? 'small' : 'large';
            const maxHeight = maxHeightMap[type];
            const targetHeight = (maxHeight * value) / 100;

            // 更新水位高度
            const waterLevelElement = waterElement.querySelector('.water-level');
            waterLevelElement.style.height = `${targetHeight}px`;
        }

        // 初始更新所有水位
        waterIds.forEach(waterInfo => {
            const waterElement = document.getElementById(waterInfo.id);
            const dataElement = document.getElementById(waterInfo.id.split('-')[1]); // 根据ID获取对应的数据元素
            updateWaterLevel(waterElement, dataElement);
        });

        // 如果需要定时器自动更新
        setInterval(() => {
            waterIds.forEach(waterInfo => {
                const waterElement = document.getElementById(waterInfo.id);
                const dataElement = document.getElementById(waterInfo.id.split('-')[1]);
                updateWaterLevel(waterElement, dataElement);
            });
        }, 5000);
    </script>

</body>
</html>
