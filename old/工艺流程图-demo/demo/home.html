<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>工艺流程图</title>
    <link rel="stylesheet" href="home.css"/>
</head>
<body>
<div class="box">
    <div class="header">
        <div class="title"><p>苏盐井神</p></div>
        <div class="menu">
            <div class="menu-item">大屏中心</div>
            <a href="数据查询.html" target="_blank" class="menu-item" style="text-decoration: none">数据查询</a>

        </div>
    </div>
    <div class="main">
        <div class="svg-pad">
            <!-- SVG content here -->
            <svg width="100%" height="100%">
                <!-- 可以在这里定义 SVG 内容，包括图像和路径 -->
                    <!-- 水桶 -->
                    <rect x="600" y="50" width="80" height="150" fill="gray" stroke="black" stroke-width="2"/>
                    <!-- 水位 -->
                    <rect id="water" x="601" y="90" width="78"  fill="blue"/>

                    <!--数据-->
                    <text  x="105" y="60" style="fill: white;font-size: 10px">卤水</text>
                    <text id="dynamic-text" x="105" y="78" style="fill: white;font-size: 10px">数据库</text>
                    <rect id="dynamic-text-Rect" x="100" y="68" width="45" height="15" stroke="green" fill="none"/>

                    <text  x="215" y="78" style="fill: white;font-size: 10px">数据库</text>

                    <text  x="440" y="60" style="fill: white;font-size: 10px">液位</text>
                    <text  x="435" y="78" style="fill: white;font-size: 10px">数据库</text>
                    <!--虚线-->
                    <path class="pipeflow" d="M 121 100 V 230"/>

                    <path class="pipeflow" d="M 451 100 V 230"/>

                    <path class="pipeflow" d="M 121 240 V 300"/>

                    <path class="pipeflow" d="M 341 240 V 300"/>
                    <path class="pipeflow" d="M 451 240 V 300"/>

                    <path class="pipeflow" d="M 121 320 V 360"/>

                    <path class="mainpipeflow" d="M 490 185 H 600 "/>

                    <path class="pipeflow" style="stroke: yellow" d="M 200 360 V 640 H 873 V 480"/>
                    <path class="pipeflow" style="stroke: green" d="M 160 360 V 680 H 953 V 480"/>
                    <path class="pipeflow" style="stroke: blue" d="M 120 360 V 720 H 1033 V 480"/>

                    <path class="pipeflow" style="stroke: red" d="M 1030 260 H 1350"/>
                    <path class="pipeflow" style="stroke: red" d="M 1030 300 H 1350"/>
                    <path class="pipeflow" style="stroke: red" d="M 1030 340 H 1350"/>

                    <path class="pipeflow" d="M 90 300 H 540 V 310 H 90 V 300"/>
                    <rect x="90" y="300" width="450" height="10" fill="#7371E7"/>
                    <circle  r="10" cx="95" cy="305" fill="gray"/>
                    <circle  r="10" cx="545" cy="305" fill="gray"/>
                    <text  x="542" y="307" style="fill: white;font-size: 10px">M</text>

                    <path class="pipeflow" d="M 90 360 H 240 V 370 H 90 V 360"/>
                    <rect x="90" y="360" width="150" height="10" fill="#7371E7"/>
                    <circle  r="10" cx="95" cy="365" fill="gray"/>
                    <circle  r="10" cx="245" cy="365" fill="gray"/>
                    <text  x="242" y="367" style="fill: white;font-size: 10px">M</text>

                    <!--箭头-->
                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 230px;left: 115px" width="11px" height="10px">
                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 230px;left: 225px" width="11px" height="10px">
                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 230px;left: 335px" width="11px" height="10px">
                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 230px;left: 445px" width="11px" height="10px">

                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 300px;left: 335px" width="11px" height="10px">
                    <img src="svg/arrow.svg" alt="arrow" style="position: absolute;top: 300px;left: 445px" width="11px" height="10px">

                    <img src="svg/tank1.svg" alt="石灰石" style="position: absolute;top: 100px;left: 70px" width="100px" height="100px">

                    <img src="svg/famen.svg" alt="阀门" style="position: absolute;top: 225px;left: 325px" width="50px" height="50px">
                    <img src="svg/famen.svg" alt="阀门" style="position: absolute;top: 225px;left: 435px" width="50px" height="50px">
                    <img src="svg/main-tank.svg" alt="水桶" style="position: absolute;top: 200px;left: 750px" width="400px" height="400px">
                    <img src="svg/Large%20cone-bottom%20polyethylene%20tank.svg" alt="水桶" style="position: absolute;top: 180px;left: 1300px" width="500px" height="500px">

            </svg>
        </div>

    </div>

    <div class="footer">
