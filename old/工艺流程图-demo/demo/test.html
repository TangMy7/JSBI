<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        .box {
            width: 100%;
            height: 100%;
            background: blue;
            display: flex;
            flex-direction: column;
        }

        .box .header {
            display: flex;
            align-items: center;
            background: yellow;
            flex: 0;
            flex-direction: row;
            padding: 10px 20px;
        }

        .box .header .title {
            background: #66c7e3;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
        }

        .box .header .title p {
            margin: 0;
            font-size: x-large;
        }

        .box .header .menu {
            display: flex;
            background: steelblue;
            margin-left: 20px;
            flex-direction: row;
            flex-grow: 1;
        }

        .box .header .menu .menu-item {
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #0b4b6b;
            color: #66c7e3;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .box .header .menu .menu-item:hover {
            background-color: #0a3e5a;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <div class="title"><p>苏盐井神</p></div>
            <div class="menu">
                <div class="menu-item">大屏中心</div>
                <div class="menu-item">资源调度</div>
                <div class="menu-item">工艺管控</div>
                <div class="menu-item">数据分析</div>
                <div class="menu-item">智能监控</div>
            </div>
        </div>
    </div>
</body>
</html>
