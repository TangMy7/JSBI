<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

<style>
.pipe {
    fill: none;
    stroke: black;
    stroke-width: 10;
}

.pipeflow {
    fill: none;
    stroke-width: 3;
    stroke-dasharray: 10;
    animation: flowLine 2s linear infinite;
}

@keyframes flowLine {
    0% {
        stroke-dashoffset: 0;
    }
    100% {
        stroke-dashoffset: -60;
    }
}
</style>



</head>
<body>
    <svg width="800" height="500">
        <defs>
            <!-- 定义阴影 -->
            <filter id="pipeShadow" x="-100%" y="-100%" width="300%" height="300%" filterUnits="userSpaceOnUse">
                <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="black"/>
            </filter>
            
            
        </defs>
    
        <!-- 下面管道 -->
        <polyline class="pipeflow" points="690,50 690,400" stroke="red" filter="url(#pipeShadow)"/>
    </svg>
    
</body>
</html>
