<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

<style>
.pipeflow {
    fill: none;
    stroke-width: 5;
    stroke-dasharray: 40 20;
    animation: flowLine 2s linear infinite;
 }
.pipe {
    fill: none;
    stroke: #3f4795;
    stroke-width: 10; /* 外层管道的线宽 */
    /*stroke-opacity: 0.5;*/
}
 @keyframes flowLine {
    0% {
        stroke-dashoffset: 0;
    }
    100% {
        stroke-dashoffset: -60;
    }
}
</style>



</head>
<body>
    <svg width="800" height="500">
        <image href="./assets/svg/new/lnq.svg" x="50" y="80" height="50"/>


    </svg>
    
</body>
</html>
